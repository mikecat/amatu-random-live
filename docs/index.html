<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>あまつランダムライブ</title>
		<link rel="icon" href="arara.ico" sizes="16x16">
		<link rel="stylesheet" href="index.css">
		<script src="arl.js"></script>
	</head>
	<body>
		<div id="bodyWrapper">
			<h1 id="mainTitle">あまつランダムライブ</h1>
			<div id="versionWrapper">
				対応バージョン：<span id="versionDisplay"></span>
			</div>
			<div>
				<fieldset id="songWrapper" disabled>
					<legend>候補となる楽曲</legend>
					<div id="songCategory" class="candidateCategories">
					</div>
					<details class="detailedCandidates">
						<summary>詳細</summary>
						<div id="songChooser">
						</div>
					</details>
				</fieldset>
				<fieldset id="idolWrapper" disabled>
					<legend>候補となるアイドル</legend>
					<div id="idolCategory" class="candidateCategories">
					</div>
					<details class="detailedCandidates">
						<summary>詳細</summary>
						<div id="idolChooser">
						</div>
					</details>
				</fieldset>
			</div>
			<div id="pickButtonWrapper">
				<button id="pickButton" type="button" disabled autocomplete="off">
					<span id="pickButtonText">抽選！</span>
				</button>
				<br>
				<label for="playEffect">
					<input type="checkbox" id="playEffect" checked disabled autocomplete="off">
						演出を再生する
					</input>
				</label>
			</div>
			<div id="resultArea">
				<div id="resultSongLabel">楽曲</div>
				<div id="resultSong">？？？？</div>
				<div id="resultLeftLabel">レフト</div>
				<div id="resultLeft">？？？？</div>
				<div id="resultCenterLabel">センター</div>
				<div id="resultCenter">？？？？</div>
				<div id="resultRightLabel">ライト</div>
				<div id="resultRight">？？？？</div>
			</div>
			<div id="postButtonWrapper">
				<button id="postButton" type="button" disabled autocomplete="off">
					<span id="postButtonText">抽選結果をポスト (ツイート)<span.
				</button>
			</div>
		</div>
	</body>
</html>
